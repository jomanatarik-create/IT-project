<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="stylesheet1.css">
</head>
<body class="contact-page">
    <header>
        <nav class="navbar">
            <div class="links">
                <div class="link"><a href="index.html">Home</a></div>
                <div class="link"><a href="course.html">My Courses</a></div>
                <div class="link"><a href="add-course.html">Add Course</a></div>
                <div class="link"><a href="contact.html">Contact Us</a></div>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Contact Us</h1>
            <p>If you have any questions or feedback, please fill out the form below.</p>

            <form>
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Course Organizer</p>
    </footer>
</body>
</html>
