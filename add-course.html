<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="stylesheet1.css">
</head>
<body class="add-course-page">
    <header>
        <nav class="navbar">
            <div class="links">
                <div class="link"><a href="index.html">Home</a></div>
                <div class="link"><a href="course.html">My Courses</a></div>
                <div class="link"><a href="add-course.html">Add Course</a></div>
                <div class="link"><a href="contact.html">Contact Us</a></div>
            </div>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h1>Add a New Course</h1>
            
            <img src="images/1c8f23efcb093cdf4d489c0508e9a881.jpg" alt="Online Learning" class="course-image">

            
            <form>
                <label for="courseName">Course Name:</label>
                <input type="text" id="courseName" name="courseName" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="creditHours">Credit Hours:</label>
                <input type="number" id="creditHours" name="creditHours" min="1" max="6" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4"></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Course Organizer</p>
    </footer>
</body>
</html>
